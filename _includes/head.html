<meta charset="utf-8">

{% include seo.html %}

<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<script>
  (function () {
    var lang = 'en';
    try {
      // Clear any pre-v2 stored choice so the site defaults to English on next visit.
      localStorage.removeItem('siteLang');
      lang = localStorage.getItem('siteLang_v2') || 'en';
    } catch (e) {}
    if (lang !== 'en' && lang !== 'zh') lang = 'en';
    document.documentElement.classList.add('lang-' + lang);
    document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
  })();
</script>

<!-- For all browsers (cache-busted per build so style updates show without a hard refresh) -->
<link rel="stylesheet" href="assets/css/main.css?v={{ site.time | date: '%s' }}">

<meta http-equiv="cleartype" content="on">
<head>
  <base target="_blank">
</head>
